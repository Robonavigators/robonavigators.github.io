<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serial Monitor | Robonavigators</title>

    <style>
        :root {
            --brand-blue: #0484f8; 
            --brand-blue-light: #e6f2ff;
            --brand-red: #ef4444;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        .container {
            width: 900px;
            max-width: 95%;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #1e293b;
        }

        .subtitle {
            font-size: 14px;
            color: #64748b;
            margin-top: 4px;
        }

        /* Controls Area */
        .controls-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: flex-end;
        }

        .control-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
        }

        .control-group select {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            color: #1e293b;
            background-color: #fff;
            transition: all 0.2s ease;
        }

        .control-group select:focus {
            border-color: var(--brand-blue);
        }

        .action-btn {
            background-color: var(--brand-blue);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            height: 46px;
        }

        .action-btn:hover {
            background-color: #0269c7;
        }

        .action-btn.disconnect {
            background-color: var(--brand-red);
        }

        .action-btn.disconnect:hover {
            background-color: #dc2626;
        }

        .action-btn:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        /* Send Command Area */
        .send-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .send-input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            color: #1e293b;
            transition: all 0.2s ease;
        }

        .send-input:focus {
            border-color: var(--brand-blue);
        }

        .send-btn {
            background-color: #f1f5f9;
            color: #475569;
            border: 2px solid #e2e8f0;
            padding: 0 25px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            background-color: #e2e8f0;
            color: #1e293b;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Terminal Area */
        .terminal-wrapper {
            background: #0f172a;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid #1e293b;
        }

        .terminal-header {
            background: #1e293b;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .terminal-title {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            font-family: monospace;
            text-transform: uppercase;
        }

        .clear-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }

        .clear-btn:hover {
            color: #fff;
        }

        .terminal {
            height: 350px; /* Taller for monitor */
            overflow-y: auto;
            padding: 15px;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #cbd5e1;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Custom scrollbar for terminal */
        .terminal::-webkit-scrollbar { width: 8px; }
        .terminal::-webkit-scrollbar-track { background: transparent; }
        .terminal::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 20px; }

        /* Footer */
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            line-height: 1.8;
        }

        .footer a {
            color: #64748b;
            text-decoration: underline;
            font-weight: 500;
        }

        .footer a:hover {
            color: var(--brand-blue);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">

            <div class="header">
                <div>
                    <div class="title">Serial Monitor</div>
                    <div class="subtitle">Connect to your ESP board to view real-time logs and send commands.</div>
                </div>
            </div>

            <div class="controls-row">
                <div class="control-group">
                    <label for="baudRate">Baud Rate</label>
                    <select id="baudRate">
                        <option value="9600">9600</option>
                        <option value="19200">19200</option>
                        <option value="38400">38400</option>
                        <option value="57600">57600</option>
                        <option value="115200" selected>115200</option>
                        <option value="460800">460800</option>
                        <option value="921600">921600</option>
                    </select>
                </div>
                <div class="control-group">
                    <button id="connectBtn" class="action-btn">
                        Connect to Port
                    </button>
                </div>
            </div>

            <div class="send-row">
                <input type="text" id="sendInput" class="send-input" placeholder="Type a command to send..." disabled>
                <button id="sendBtn" class="send-btn" disabled>Send</button>
            </div>

            <div class="terminal-wrapper">
                <div class="terminal-header">
                    <span class="terminal-title">Serial Output</span>
                    <button class="clear-btn" id="clearLogBtn">Clear Output</button>
                </div>
                <div class="terminal" id="terminal">Robonavigators Serial Monitor v1.0.0
Waiting for device connection...
</div>
            </div>

            <div class="footer">
                Chrome, Edge browser required • Use at your own risk <br>
                For more general information visit the <a href="https://github.com/Robonavigators/robonavigators.github.io/blob/main/README.md" target="_blank">Robonavigators Github Page</a>
            </div>

        </div>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const baudRateSelect = document.getElementById('baudRate');
        const terminal = document.getElementById('terminal');
        const clearBtn = document.getElementById('clearLogBtn');
        const sendInput = document.getElementById('sendInput');
        const sendBtn = document.getElementById('sendBtn');

        let port;
        let reader;
        let inputDone;
        let outputDone;
        let inputStream;
        let outputStream;
        let isConnected = false;

        // Terminal logic
        function appendToTerminal(text) {
            terminal.textContent += text;
            terminal.scrollTop = terminal.scrollHeight;
        }

        clearBtn.addEventListener('click', () => {
            terminal.textContent = '';
        });

        // Toggle UI State
        function updateUIState(connected) {
            isConnected = connected;
            baudRateSelect.disabled = connected;
            sendInput.disabled = !connected;
            sendBtn.disabled = !connected;
            
            if (connected) {
                connectBtn.textContent = "Disconnect";
                connectBtn.classList.add("disconnect");
                sendInput.focus();
            } else {
                connectBtn.textContent = "Connect to Port";
                connectBtn.classList.remove("disconnect");
            }
        }

        // Connection Logic
        async function toggleConnection() {
            if (isConnected) {
                await disconnect();
            } else {
                await connect();
            }
        }

        async function connect() {
            if (!("serial" in navigator)) {
                appendToTerminal("\n[ERROR] Web Serial API not supported in this browser. Please use Chrome or Edge.\n");
                return;
            }

            try {
                // Request port
                port = await navigator.serial.requestPort();
                
                // Open port with selected baud rate
                await port.open({ baudRate: parseInt(baudRateSelect.value) });

                // Setup streams for text encoding/decoding
                const encoder = new TextEncoderStream();
                outputDone = encoder.readable.pipeTo(port.writable);
                outputStream = encoder.writable;

                const decoder = new TextDecoderStream();
                inputDone = port.readable.pipeTo(decoder.writable);
                inputStream = decoder.readable;
                reader = inputStream.getReader();

                updateUIState(true);
                appendToTerminal(`\n\n--- Connected at ${baudRateSelect.value} baud ---\n`);

                readLoop();
            } catch (err) {
                if (err.name === 'NotFoundError') {
                    appendToTerminal("\n[SYSTEM] No port selected.\n");
                } else {
                    appendToTerminal(`\n[ERROR] Failed to open port: ${err.message}\n`);
                }
            }
        }

        async function disconnect() {
            try {
                if (reader) {
                    await reader.cancel();
                    await inputDone.catch(() => {});
                    reader = null;
                    inputDone = null;
                }
                if (outputStream) {
                    await outputStream.getWriter().close();
                    await outputDone.catch(() => {});
                    outputStream = null;
                    outputDone = null;
                }
                if (port) {
                    await port.close();
                    port = null;
                }
                updateUIState(false);
                appendToTerminal(`\n--- Disconnected ---\n`);
            } catch (err) {
                appendToTerminal(`\n[ERROR] Disconnect failed: ${err.message}\n`);
            }
        }

        async function readLoop() {
            while (true) {
                try {
                    const { value, done } = await reader.read();
                    if (value) {
                        appendToTerminal(value);
                    }
                    if (done) {
                        reader.releaseLock();
                        break;
                    }
                } catch (err) {
                    appendToTerminal(`\n[ERROR] Reading error: ${err.message}\n`);
                    break;
                }
            }
        }

        // Sending Logic
        async function sendData() {
            if (!isConnected || !outputStream) return;
            
            const text = sendInput.value;
            if (!text) return;

            try {
                const writer = outputStream.getWriter();
                // Append CRLF (\r\n) as standard for serial communications
                await writer.write(text + "\r\n");
                writer.releaseLock();
                
                // Echo sent command to terminal (optional, helpful for debugging)
                appendToTerminal(`\n> ${text}\n`);
                
                sendInput.value = '';
            } catch (err) {
                appendToTerminal(`\n[ERROR] Failed to send: ${err.message}\n`);
            }
        }

        // Event Listeners
        connectBtn.addEventListener('click', toggleConnection);
        sendBtn.addEventListener('click', sendData);
        sendInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendData();
            }
        });
    </script>
</body>
</html>
